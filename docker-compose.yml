services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: x11js-server
    ports:
      - "9090:9090"
    volumes:
      - .:/app
      - server_node_modules:/app/node_modules
      - x11_socket:/tmp/.X11-unix
    environment:
      DISPLAY_NUM: "0"
      WS_PORT: "9090"
      AUTORUN_ARGS: "-sb -sl 5000"

  apps:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: x11js-apps
    depends_on:
      - server
    volumes:
      - x11_socket:/tmp/.X11-unix
    environment:
      DISPLAY: ":0"
    # Idle by default; run X clients with: docker compose exec apps xeyes
    command: ["sleep", "infinity"]

volumes:
  server_node_modules:
  x11_socket:
